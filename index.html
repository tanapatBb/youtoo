<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 บันทึกสถานะคนติดจอ Real-time 🍿</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Mitr', sans-serif; }
        button:disabled {
            background-color: #d1d5db !important;
            color: #9ca3af !important;
            cursor: not-allowed !important;
            transform: none !important;
            opacity: 0.6;
        }
    </style>
</head>
<body class="bg-pink-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center border-4 border-pink-200">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">ใครทำอะไรอยู่เอ่ย? 👀</h1>
        <p class="text-gray-500 mb-6 text-sm">ระบบเชื่อมต่อแบบเสถียร 100% ไม่ติด CORS</p>

        <div class="bg-pink-100 rounded-2xl p-4 mb-4 flex justify-around items-center">
            <span class="text-gray-700 font-medium">คุณคือใครอา:</span>
            <label class="inline-flex items-center cursor-pointer">
                <input type="radio" name="user-name" value="Best" checked class="w-5 h-5 text-pink-600">
                <span class="ml-2 text-gray-800 font-medium">🕺 Best</span>
            </label>
            <label class="inline-flex items-center cursor-pointer">
                <input type="radio" name="user-name" value="Noon" class="w-5 h-5 text-pink-600">
                <span class="ml-2 text-gray-800 font-medium">💃 Noon</span>
            </label>
        </div>

        <div class="bg-gray-100 rounded-2xl p-4 mb-6">
            <p class="text-xs text-gray-400 uppercase tracking-wider">สถานะล่าสุดในระบบ</p>
            <div id="current-status" class="text-xl font-medium text-gray-700 mt-1">🔄 กำลังเชื่อมต่อสถานะ...</div>
        </div>

        <div class="space-y-4">
            <button id="btn-netflix" onclick="changeStatus('Netflix🍿')" class="w-full bg-red-600 hover:bg-red-700 text-white font-medium py-4 px-6 rounded-2xl shadow-md transition-all transform hover:scale-[1.02] flex items-center justify-center gap-3 cursor-pointer">
                <span>🎬</span> กำลังดู Netflix น้า
            </button>
            <button id="btn-youtube" onclick="changeStatus('YouTube📺')" class="w-full bg-red-500 hover:bg-red-600 text-white font-medium py-4 px-6 rounded-2xl shadow-md transition-all transform hover:scale-[1.02] flex items-center justify-center gap-3 cursor-pointer">
                <span>🎧</span> ท่องโลก YouTube แป๊บเน้อ
            </button>
            <button id="btn-clear" onclick="changeStatus('Clear')" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-3 px-6 rounded-2xl shadow-md transition-all transform hover:scale-[1.02] flex items-center justify-center gap-3 cursor-pointer">
                <span>✅</span> ดูเสร็จแล้ว/ว่างแล้วจ้า!
            </button>
        </div>
    </div>

    <script>
        // ⚠️ เอา URL Web app ของ Google Script มาวางตรงนี้ครับ
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz4zq3DNXJ8GxcvPTHNRPbflM0yJLJavzUv9R_7DvlsCtsc_qRJ2ikZ5K9hEAxFRGwFQw/exec';

        // 🔄 1. ฟังก์ชันรับข้อมูลกลับมาแสดงผลที่หน้าจอเว็บ
        function handleStatusResponse(data) {
            if (data) {
                const status = data.status;
                const user = data.user;
                
                document.getElementById('btn-netflix').disabled = false;
                document.getElementById('btn-youtube').disabled = false;
                
                if (status === 'Netflix🍿') {
                    document.getElementById('current-status').innerText = `🍿 ${user} กำลังดู Netflix อยู่จ้า`;
                    document.getElementById('btn-netflix').disabled = true;
                } else if (status === 'YouTube📺') {
                    document.getElementById('current-status').innerText = `📺 ${user} กำลังดู YouTube อยู่จ้า`;
                    document.getElementById('btn-youtube').disabled = true;
                } else {
                    document.getElementById('current-status').innerText = `✨ ว่างกันทั้งคู่ ทักมาได้เลยจ้า ✨`;
                }
            }
        }

        // 🔄 2. ฟังก์ชันดึงสถานะ Real-time อัตโนมัติ (ขารับข้อมูล)
        function checkRealtimeStatus() {
            const oldScript = document.getElementById('jsonp-check');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'jsonp-check';
            script.src = `${GOOGLE_SCRIPT_URL}?callback=handleStatusResponse&_ts=${new Date().getTime()}`;
            document.body.appendChild(script);
        }

        // ตั้งเวลาอัปเดตหน้าจออัตโนมัติทุกๆ 3 วินาที
        setInterval(checkRealtimeStatus, 3000);
        checkRealtimeStatus();


        // 📨 3. ฟังก์ชันรับคำตอบหลังจากกดส่งข้อมูลสำเร็จ
        function handleUpdateResponse(data) {
            if (data && data.status === "success") {
                alert("อัปเดตสถานะและส่งข้อความเข้า LINE เรียบร้อยแล้วจ้า! ❤️");
                checkRealtimeStatus();
            }
        }

        // 📨 4. ฟังก์ชันส่งข้อมูลเมื่อมีการกดปุ่ม (ขาส่งข้อมูล)
        function changeStatus(type) {
            const selectedUser = document.querySelector('input[name="user-name"]:checked').value;
            let message = '';

            if (type === 'Netflix🍿') {
                message = `📢 [แจ้งเตือน]\n🎬 ตอนนี้ ${selectedUser} กำลังดู Netflix อยู่ดุ๊กดิ๊กๆ น้า\n🍿 อาจจะตอบช้าแป๊บนึงจ้า`;
            } else if (type === 'YouTube📺') {
                message = `📢 [แจ้งเตือน]\n🎧 ตอนนี้ ${selectedUser} โดน YouTube ดูดวิญญาณอยู่ค้าบ\n👀 มีอะไรด่วนทักสะกิดเรียกได้เลยนะ`;
            } else if (type === 'Clear') {
                message = `📢 [แจ้งเตือน]\n✅ ตอนนี้ ${selectedUser} ว่างเรียบร้อยแล้วจ้า!\n🥰 พร้อมคุยกับเธอแล้ว คิดถึงจัง`;
            }

            const oldScript = document.getElementById('jsonp-update');
            if (oldScript) oldScript.remove();

            // ส่งข้อมูลทั้งหมดผ่าน URL Parameter เพื่อหลบเลี่ยงการติด CORS ของคำสั่ง POST
            const script = document.createElement('script');
            script.id = 'jsonp-update';
            script.src = `${GOOGLE_SCRIPT_URL}?action=update&sender=${encodeURIComponent(selectedUser)}&statusType=${encodeURIComponent(type)}&message=${encodeURIComponent(message)}&callback=handleUpdateResponse&_ts=${new Date().getTime()}`;
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
